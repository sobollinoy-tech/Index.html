<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שני ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
overflow:hidden;
}

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
opacity:0;
transition:opacity .6s ease;
}

.page.active{
display:flex;
opacity:1;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:500px;
width:90%;
}

h1{color:#ff4f8b}

button{
border:none;
border-radius:16px;
padding:14px 26px;
font-size:18px;
cursor:pointer;
margin:8px;
transition:.2s;
}

button:hover{transform:scale(1.05);}

.yes{background:#4cd137;color:white;}
.no{background:#ff6b6b;color:white;position:relative;}

.food{width:100%;background:#fff;border:1px solid #eee;}

.topbar{
position:fixed;
top:10px;
right:10px;
background:white;
padding:8px 12px;
border-radius:10px;
font-size:14px;
}

.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
}

.heart{
position:absolute;
animation:fall linear forwards;
}

@keyframes fall{
from{transform:translateY(-50px);opacity:1}
to{transform:translateY(110vh);opacity:0}
}

</style>
</head>

<body>

<div class="topbar" id="progress">שלב 1/3 ❤️</div>
<div class="hearts" id="hearts"></div>

<audio id="music" src="music.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="card">
<h1 id="title">שני...</h1>
<p>יש לי שאלה קטנה 😳</p>
<h2>רוצה לצאת איתי לדייט?</h2>

<button class="yes" onclick="yes()">כן 💖</button>
<button class="no" id="no">לא 🙈</button>
</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="card">
<h1>מעולה 😍</h1>
<h3>מה בא לנו לאכול?</h3>

<button class="food" onclick="food('סושי')">🍣 סושי</button>
<button class="food" onclick="food('פסטה')">🍝 פסטה</button>
<button class="food" onclick="food('המבורגר צמחוני')">🍔 המבורגר</button>
<button class="food" onclick="food('ראמן')">🍜 ראמן</button>
<button class="food" onclick="food('מקסיקני')">🌮 מקסיקני</button>
</div>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<div class="card">
<h1>קובעים ❤️</h1>

<input type="date" id="date"><br>
<input type="time" id="time"><br>

<button class="yes" onclick="finish()">סגור דייט</button>

<p id="out"></p>

<button class="yes" id="wa" style="display:none;">שליחה בוואטסאפ 📩</button>
<button onclick="copy()">העתקת הודעה 📋</button>
</div>
</div>

<script>

let chosen="";

function show(id, step){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.getElementById("progress").innerText="שלב "+step+"/3 ❤️";
}

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{
const x=Math.random()*200;
const y=Math.random()*200;
no.style.transform=`translate(${x}px,${y}px)`;
});

function yes(){
document.getElementById("music").play();
confetti({particleCount:200,spread:120});
show("p2",2);
}

function food(f){
chosen=f;
if(f==="סושי") alert("ממש מפתיע 😂");
show("p3",3);
}

let finalMsg="";

function finish(){
const d=document.getElementById("date").value;
const t=document.getElementById("time").value;

if(!d||!t){alert("תבחרי הכל 😘");return;}

confetti({particleCount:300,spread:140});

finalMsg=`שני אמרה כן ❤️
אוכל: ${chosen}
תאריך: ${d}
שעה: ${t}`;

document.getElementById("out").innerText=finalMsg;

localStorage.setItem("dateData",finalMsg);

const wa=document.getElementById("wa");
wa.style.display="inline-block";

wa.onclick=()=>{
window.open("https://wa.me/972527791304?text="+encodeURIComponent(finalMsg));
};
}

function copy(){
navigator.clipboard.writeText(finalMsg);
alert("הועתק ❤️");
}

function hearts(){
const h=document.createElement("div");
h.className="heart";
h.innerText="💖";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(3+Math.random()*4)+"s";
document.getElementById("hearts").appendChild(h);
setTimeout(()=>h.remove(),7000);
}
setInterval(hearts,400);

</script>

</body>
</html>
